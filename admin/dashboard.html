<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="logo">💼 公司工資系統</div>
  <div class="user">
    Admin
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- ===== Main Layout ===== -->
<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    <a href="#">🏠 Dashboard</a>
    <a href="#">🗂 Master Data</a>
    <a href="#">👥 Employees</a>
    <a href="#">⏱ Attendance</a>
    <a href="#">💰 Payroll</a>
    <a href="#">📄 Reports</a>
  </div>

  <!-- Content -->
  <div class="content">
    <h1>👋 歡迎，管理員</h1>
    <p>請從左邊選擇你要管理的功能。</p>
  </div>

</div>

<script>
  // ✅ Admin 守門
  if (localStorage.getItem("role") !== "admin") {
    window.location.href = "../login.html";
  }

  function logout() {
    localStorage.removeItem("role");
    window.location.href = "../login.html";
  }
</script>

</body>
</html>
