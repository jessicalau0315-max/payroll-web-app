<!DOCTYPE html>
<html>

<head>
  <title>Testing | Admin - Master Data</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- Header -->
<div class="header">
  <div class="logo">🧪 Testing</div>
  <div class="user">Admin <button onclick="logout()">Logout</button></div>
</div>

<div class="layout">

  <!-- Sidebar -->
  <div class="sidebar">
    admin/dashboard.html🏠 Dashboard</a>
    master.html🗂 Master Data</a>
    employees.html👥 Employees</a>
    attendance.html⏱ Attendance</a>
    payroll.html💰 Payroll</a>
    reports.html📄 Reports</a>
  </div>

  <!-- Content -->
  <div class="content">
    <h1>🗂 Master Data</h1>

    <!-- Location Master -->
    <h2>📍 上班地點（Location）</h2>

    <input id="locationInput" placeholder="輸入上班地點">
    <button onclick="addLocation()">新增</button>

    <ul id="locationList"></ul>

  </div>
</div>

<script>
  // 權限守門
  if (localStorage.getItem("role") !== "admin") {
    window.location.href = "../login.html";
  }

  function logout() {
    localStorage.removeItem("role");
    window.location.href = "../login.html";
  }

  // ===== Location Master Logic =====
  const locations = [];

  function addLocation() {
    const input = document.getElementById("locationInput");
    const value = input.value.trim();

    if (value === "") return;

    locations.push(value);
    input.value = "";
    renderLocations();
  }

  function renderLocations() {
    const list = document.getElementById("locationList");
    list.innerHTML = "";

    locations.forEach((loc, index) => {
      const li = document.createElement("li");
      li.innerText = loc;
      list.appendChild(li);
    });
  }
</script>

</body>
</html>
