<!DOCTYPE html>
<html>
<head>
  <title>Testing | Admin - Master Data</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="logo">🧪 Testing</div>
  <div class="user">
    Admin
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- ===== Layout ===== -->
<div class="layout">

  <!-- ===== Sidebar ===== -->
  <div class="sidebar">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="master.html">🗂 Master Data</a>
    <a href="employees.html">👥 Employees</a>
    <a href="attendance.html">⏱ Attendance</a>
    <a href="payroll.html">💰 Payroll</a>
    <a href="reports.html">📄 Reports</a>
  </div>

  <!-- ===== Content ===== -->
  <div class="content">
    <h1>Master Data</h1>

    <!-- ===== Tabs ===== -->
    <div class="master-tabs">
      <div class="master-tab active" onclick="showMasterTab('location')">上班地點</div>
      <div class="master-tab" onclick="showMasterTab('department')">部門</div>
      <div class="master-tab" onclick="showMasterTab('job')">工種</div>
      <div class="master-tab" onclick="showMasterTab('shift')">班次 / 崗位</div>
    </div>

    <!-- ===== Location ===== -->
    
<!-- ===== Location ===== -->
<div id="tab-location" class="master-content active">

  <div style="display:flex; align-items:center; justify-content:space-between;">
    <h2 style="margin:0;">📍 上班地點（Location）</h2>
    <button class="add-btn" onclick="openLocationModal()">+</button>
  </div>

  <table class="table" style="margin-top:12px;">
    <thead>
      <tr>
        <th>公司名稱</th>
        <th>工作地點</th>
        <th>狀態</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="locationTableBody"></tbody>
  </table>

</div>

  <!-- ===== Location Modal ===== -->
<div id="locationModal" class="modal-overlay">
  <div class="modal">

    <div class="modal-header">
      <h3 id="locationModalTitle">新增上班地點</h3>
      <span class="modal-close" onclick="closeLocationModal()">✕</span>
    </div>

    <div class="modal-body">
      <label>公司名稱</label>
      <select id="locCompany">
        <option value="KLN Logistics (HK) LTD.">
          KLN Logistics (HK) LTD.
        </option>
      </select>

      <label>工作地點</label>
      <input id="locName" placeholder="請輸入工作地點">

      <!-- hidden，用嚟分新增 / 編輯 -->
      <input type="hidden" id="locEditId">
    </div>

    <div class="modal-footer">
      <button onclick="closeLocationModal()">取消</button>
      <button onclick="saveLocation()">儲存</button>
    </div>

  </div>
</div>

<!-- ===== Department ===== -->
<div id="tab-department" class="master-content">

  <div style="display:flex; align-items:center; justify-content:space-between;">
    <h2 style="margin:0;">🏢 部門（Department）</h2>
    <button class="add-btn" onclick="openDepartmentModal()">+</button>
  </div>

  <table class="table" style="margin-top:12px;">
    <thead>
      <tr>
        <th>公司名稱</th>
        <th>工作地點</th>
        <th>部門代碼</th>
        <th>部門名稱</th>
        <th>狀態</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="departmentTableBody"></tbody>
  </table>

</div>

    <!-- ===== Department Modal ===== -->
<div id="departmentModal" class="modal-overlay">
  <div class="modal">

    <div class="modal-header">
      <h3 id="departmentModalTitle">新增部門</h3>
      <span class="modal-close" onclick="closeDepartmentModal()">✕</span>
    </div>

    <div class="modal-body">
      <label>公司名稱</label>
      <select id="deptCompany">
        <option value="KLN Logistics (HK) LTD.">
          KLN Logistics (HK) LTD.
        </option>
      </select>

      <label>工作地點</label>
      <select id="deptLocation"></select>

      <label>部門代碼（只限英文及數字）</label>
      <input id="deptCode">

      <label>部門名稱</label>
      <input id="deptName">

      <input type="hidden" id="deptEditId">
    </div>

    <div class="modal-footer">
      <button onclick="closeDepartmentModal()">取消</button>
      <button onclick="saveDepartment()">儲存</button>
    </div>

  </div>
</div>
    
    <!-- ===== Job Type ===== -->
<div id="tab-job" class="master-content">

  <div style="display:flex; align-items:center; justify-content:space-between;">
    <h2 style="margin:0;">🛠 工種（Job Type）</h2>
    <button class="add-btn" onclick="openJobModal()">+</button>
  </div>

  <table class="table" style="margin-top:12px;">
    <thead>
      <tr>
        <th>公司名稱</th>
        <th>工作地點</th>
        <th>部門</th>
        <th>工種代碼</th>
        <th>工種名稱</th>
        <th>狀態</th>
        <th>操作</th>
      </tr>
    </thead>
    <tbody id="jobTableBody"></tbody>
  </table>

</div>

    <!-- ===== Job Modal ===== -->
<div id="jobModal" class="modal-overlay">
  <div class="modal">

    <div class="modal-header">
      <h3 id="jobModalTitle">新增工種</h3>
      <span class="modal-close" onclick="closeJobModal()">✕</span>
    </div>

    <div class="modal-body">
      <label>公司名稱</label>
      <select id="jobCompany">
        <option value="KLN Logistics (HK) LTD.">
          KLN Logistics (HK) LTD.
        </option>
      </select>

      <label>工作地點</label>
      <select id="jobLocation" onchange="onJobLocationChange()"></select>

      <label>部門</label>
      <select id="jobDepartment"></select>

      <label>工種代碼（只限英文及數字）</label>
      <input id="jobCode">

      <label>工種名稱</label>
      <input id="jobName">

      <input type="hidden" id="jobEditId">
    </div>

    <div class="modal-footer">
      <button onclick="closeJobModal()">取消</button>
      <button onclick="saveJob()">儲存</button>
    </div>

  </div>
</div>

<!-- ===== Script ===== -->

<script>
/* ===== Auth ===== */
if (localStorage.getItem("role") !== "admin") {
  window.location.href = "../login.html";
}
function logout() {
  localStorage.clear();
  window.location.href = "../login.html";
}

/* ===== Tabs ===== */
function showMasterTab(type) {
  document.querySelectorAll('.master-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.master-content').forEach(c => c.classList.remove('active'));
  document.querySelector(`.master-tab[onclick="showMasterTab('${type}')"]`).classList.add('active');
  document.getElementById('tab-' + type).classList.add('active');
}

/* =====================================================
   ✅ Location – Table + Edit + Enable / Disable
   ===================================================== */

let locations = JSON.parse(localStorage.getItem("locations")) || [];

/* Modal Control */
function openLocationModal(location = null) {
  document.getElementById("locationModal").style.display = "flex";

  if (location) {
    document.getElementById("locationModalTitle").innerText = "編輯上班地點";
    document.getElementById("locCompany").value = location.company;
    document.getElementById("locName").value = location.name;
    document.getElementById("locEditId").value = location.id;
  } else {
    document.getElementById("locationModalTitle").innerText = "新增上班地點";
    document.getElementById("locCompany").value = "KLN Logistics (HK) LTD.";
    document.getElementById("locName").value = "";
    document.getElementById("locEditId").value = "";
  }
}

function closeLocationModal() {
  document.getElementById("locationModal").style.display = "none";
}

/* Save (Create / Update) */
function saveLocation() {
  const company = document.getElementById("locCompany").value;
  const name = document.getElementById("locName").value.trim();
  const editId = document.getElementById("locEditId").value;

  if (!name) {
    alert("請輸入工作地點");
    return;
  }

  if (editId) {
    // update
    locations = locations.map(l =>
      l.id == editId ? { ...l, company, name } : l
    );
  } else {
    // create
    locations.push({
      id: Date.now(),
      company,
      name,
      active: true
    });
  }

  localStorage.setItem("locations", JSON.stringify(locations));
  closeLocationModal();
  renderLocationTable();
}

/* Enable / Disable */
function toggleLocation(id) {
  locations = locations.map(l =>
    l.id === id ? { ...l, active: !l.active } : l
  );
  localStorage.setItem("locations", JSON.stringify(locations));
  renderLocationTable();
}

/* Render Table */
function renderLocationTable() {
  const tbody = document.getElementById("locationTableBody");
  tbody.innerHTML = "";

  locations.forEach(loc => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${loc.company}</td>
      <td>${loc.name}</td>
      <td>${loc.active ? "✅ 啟用" : "⛔ 已停用"}</td>
      <td>
        <button onclick='openLocationModal(${JSON.stringify(loc)})'>編輯</button>
        <button onclick='toggleLocation(${loc.id})'>
          ${loc.active ? "停用" : "啟用"}
        </button>
      </td>
    `;

    tbody.appendChild(tr);
  });
}

/* Init */
renderLocationTable();

  /* =====================================================
   ✅ Department – depends on Location
   ===================================================== */

let departments = JSON.parse(localStorage.getItem("departments")) || [];

/* Modal Control */
function openDepartmentModal(dept = null) {
  document.getElementById("departmentModal").style.display = "flex";
  document.getElementById("departmentModalTitle").innerText = dept ? "編輯部門" : "新增部門";

  // populate location dropdown (only active)
  const locSelect = document.getElementById("deptLocation");
  locSelect.innerHTML = "";

  locations.filter(l => l.active).forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.text = l.name;
    locSelect.appendChild(opt);
  });

  if (dept) {
    document.getElementById("deptCompany").value = dept.company;
    document.getElementById("deptLocation").value = dept.locationId;
    document.getElementById("deptCode").value = dept.code;
    document.getElementById("deptName").value = dept.name;
    document.getElementById("deptEditId").value = dept.id;
  } else {
    document.getElementById("deptCompany").value = "KLN Logistics (HK) LTD.";
    document.getElementById("deptCode").value = "";
    document.getElementById("deptName").value = "";
    document.getElementById("deptEditId").value = "";
  }
}

function closeDepartmentModal() {
  document.getElementById("departmentModal").style.display = "none";
}

/* Save */
function saveDepartment() {
  const company = deptCompany.value;
  const locationId = Number(deptLocation.value);
  const location = locations.find(l => l.id === locationId);
  const code = deptCode.value.trim();
  const name = deptName.value.trim();
  const editId = deptEditId.value;

  if (!code || !name) {
    alert("請填寫完整部門資料");
    return;
  }

  if (!/^[A-Za-z0-9]+$/.test(code)) {
    alert("部門代碼只限英文及數字");
    return;
  }

  if (editId) {
    departments = departments.map(d =>
      d.id == editId
        ? { ...d, company, locationId, locationName: location.name, code, name }
        : d
    );
  } else {
    departments.push({
      id: Date.now(),
      company,
      locationId,
      locationName: location.name,
      code,
      name,
      active: true
    });
  }

  localStorage.setItem("departments", JSON.stringify(departments));
  closeDepartmentModal();
  renderDepartmentTable();
}

/* Enable / Disable */
function toggleDepartment(id) {
  departments = departments.map(d =>
    d.id === id ? { ...d, active: !d.active } : d
  );
  localStorage.setItem("departments", JSON.stringify(departments));
  renderDepartmentTable();
}

/* Render */
function renderDepartmentTable() {
  const tbody = document.getElementById("departmentTableBody");
  tbody.innerHTML = "";

  departments.forEach(d => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${d.company}</td>
      <td>${d.locationName}</td>
      <td>${d.code}</td>
      <td>${d.name}</td>
      <td>${d.active ? "✅ 啟用" : "⛔ 已停用"}</td>
      <td>
        <button onclick='openDepartmentModal(${JSON.stringify(d)})'>編輯</button>
        <button onclick='toggleDepartment(${d.id})'>
          ${d.active ? "停用" : "啟用"}
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

/* Init */
renderDepartmentTable();

  /* =====================================================
   ✅ Job Type – depends on Location & Department
   ===================================================== */

let jobs = JSON.parse(localStorage.getItem("jobs")) || [];

/* Modal Control */
function openJobModal(job = null) {
  document.getElementById("jobModal").style.display = "flex";
  jobModalTitle.innerText = job ? "編輯工種" : "新增工種";

  // populate locations (only active)
  jobLocation.innerHTML = "";
  locations.filter(l => l.active).forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.id;
    opt.text = l.name;
    jobLocation.appendChild(opt);
  });

  onJobLocationChange();

  if (job) {
    jobCompany.value = job.company;
    jobLocation.value = job.locationId;
    onJobLocationChange();
    jobDepartment.value = job.departmentId;
    jobCode.value = job.code;
    jobName.value = job.name;
    jobEditId.value = job.id;
  } else {
    jobCompany.value = "KLN Logistics (HK) LTD.";
    jobCode.value = "";
    jobName.value = "";
    jobEditId.value = "";
  }
}

function closeJobModal() {
  document.getElementById("jobModal").style.display = "none";
}

/* When Location changes → filter departments */
function onJobLocationChange() {
  const locId = Number(jobLocation.value);
  jobDepartment.innerHTML = "";

  departments
    .filter(d => d.active && d.locationId === locId)
    .forEach(d => {
      const opt = document.createElement("option");
      opt.value = d.id;
      opt.text = d.name;
      jobDepartment.appendChild(opt);
    });
}

/* Save */
function saveJob() {
  const company = jobCompany.value;
  const locationId = Number(jobLocation.value);
  const departmentId = Number(jobDepartment.value);
  const location = locations.find(l => l.id === locationId);
  const department = departments.find(d => d.id === departmentId);
  const code = jobCode.value.trim();
  const name = jobName.value.trim();
  const editId = jobEditId.value;

  if (!code || !name || !department) {
    alert("請填寫完整工種資料");
    return;
  }

  if (!/^[A-Za-z0-9]+$/.test(code)) {
    alert("工種代碼只限英文及數字");
    return;
  }

  const record = {
    id: editId ? Number(editId) : Date.now(),
    company,
    locationId,
    locationName: location.name,
    departmentId,
    departmentName: department.name,
    code,
    name,
    active: true
  };

  if (editId) {
    jobs = jobs.map(j => j.id == editId ? record : j);
  } else {
    jobs.push(record);
  }

  localStorage.setItem("jobs", JSON.stringify(jobs));
  closeJobModal();
  renderJobTable();
}

/* Enable / Disable */
function toggleJob(id) {
  jobs = jobs.map(j =>
    j.id === id ? { ...j, active: !j.active } : j
  );
  localStorage.setItem("jobs", JSON.stringify(jobs));
  renderJobTable();
}

/* Render Table */
function renderJobTable() {
  const tbody = document.getElementById("jobTableBody");
  tbody.innerHTML = "";

  jobs.forEach(j => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${j.company}</td>
      <td>${j.locationName}</td>
      <td>${j.departmentName}</td>
      <td>${j.code}</td>
      <td>${j.name}</td>
      <td>${j.active ? "✅ 啟用" : "⛔ 已停用"}</td>
      <td>
        <button onclick='openJobModal(${JSON.stringify(j)})'>編輯</button>
        <button onclick='toggleJob(${j.id})'>
          ${j.active ? "停用" : "啟用"}
        </button>
      </td>
    `;
    tbody.appendChild(tr);
  });
}

/* Init */
renderJobTable();
  
</script>

</body>
</html>
