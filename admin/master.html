<!DOCTYPE html>
<html>
<head>
  <title>Testing | Admin - Master Data</title>

  <!-- ✅ CSS -->
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="logo">🧪 Testing</div>
  <div class="user">
    Admin
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- ===== Layout ===== -->
<div class="layout">

  <!-- ===== Sidebar ===== -->
  <div class="sidebar">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="master.html">🗂 Master Data</a>
    <a href="employees.html">👥 Employees</a>
    <a href="attendance.html">⏱ Attendance</a>
    <a href="payroll.html">💰 Payroll</a>
    <a href="reports.html">📄 Reports</a>
  </div>

  <!-- ===== Content ===== -->
  <div class="content">
    <h1>🗂 Master Data</h1>

    <!-- ===== Tabs ===== -->
    <div class="master-tabs">
      <div class="master-tab active" onclick="showMasterTab('location')">上班地點</div>
      <div class="master-tab" onclick="showMasterTab('department')">部門</div>
      <div class="master-tab" onclick="showMasterTab('job')">工種</div>
      <div class="master-tab" onclick="showMasterTab('shift')">班次 / 崗位</div>
    </div>

    <!-- ===== Location ===== -->

<!-- ===== Location ===== -->
<div id="tab-location" class="master-content active">

  <div style="display:flex; align-items:center;">
    <h2 style="margin:0;">📍 上班地點（Location）</h2>
    <button class="add-btn" onclick="openLocationModal()">+</button>
  </div>

  <ul id="locationList"></ul>
</div>

    <!-- ===== Location Modal ===== -->
<div id="locationModal" class="modal-overlay">
  <div class="modal">
    
    <div class="modal-header">
      <h3>新增上班地點</h3>
      <span class="modal-close" onclick="closeLocationModal()">✕</span>
    </div>

    <div class="modal-body">
      <label>公司名稱</label>
      <select id="locCompany">
        <option value="KLN Logistics (HK) LTD.">
          KLN Logistics (HK) LTD.
        </option>
      </select>

      <label>工作地點</label>
      <input id="locName" placeholder="請輸入工作地點">
    </div>

    <div class="modal-footer">
      <button onclick="closeLocationModal()">取消</button>
      <button onclick="saveLocation()">確認新增</button>
    </div>

  </div>
</div>

    <!-- ===== Department ===== -->
    <div id="tab-department" class="master-content">
      <h2>🏢 部門（Department）</h2>
      <input id="deptCode" placeholder="Code (例如: HR)">
      <input id="deptName" placeholder="名稱">
      <button onclick="addDepartment()">新增</button>
      <ul id="deptList"></ul>
    </div>

    <!-- ===== Job ===== -->
    <div id="tab-job" class="master-content">
      <h2>🛠 工種（Job Type）</h2>
      <input id="jobCode" placeholder="Code (例如: DRIVER)">
      <input id="jobName" placeholder="名稱">
      <button onclick="addJob()">新增</button>
      <ul id="jobList"></ul>
    </div>

    <!-- ===== Shift ===== -->
    <div id="tab-shift" class="master-content">
      <h2>⏰ 班次 / 崗位（Shift / Post）</h2>
      <input id="shiftCode" placeholder="Code (例如: AM)">
      <input id="shiftName" placeholder="名稱">
      <button onclick="addShift()">新增</button>
      <ul id="shiftList"></ul>
    </div>

  </div>
</div>

<!-- ===== Script ===== -->
<script>
/* ===== Auth ===== */
if (localStorage.getItem("role") !== "admin") {
  window.location.href = "../login.html";
}
function logout() {
  localStorage.clear();
  window.location.href = "../login.html";
}

/* ===== Tabs ===== */
function showMasterTab(type) {
  document.querySelectorAll('.master-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.master-content').forEach(c => c.classList.remove('active'));

  document.querySelector(`.master-tab[onclick="showMasterTab('${type}')"]`).classList.add('active');
  document.getElementById('tab-' + type).classList.add('active');
}

/* ===== Storage Helpers ===== */
function load(k){ return JSON.parse(localStorage.getItem(k) || "[]"); }
function save(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

/* ===== Location ===== */
let locations = load("locations");
function addLocation(){
  locations.push({id:Date.now(), code:locCode.value, name:locName.value, active:true});
  save("locations", locations);
  locCode.value = locName.value = "";
  renderLocations();
}
function renderLocations(){
  locList.innerHTML = "";
  locations.forEach(l => locList.innerHTML += `<li>${l.code} - ${l.name}</li>`);
}
renderLocations();

/* ===== Department ===== */
let departments = load("departments");
function addDepartment(){
  departments.push({id:Date.now(), code:deptCode.value, name:deptName.value, active:true});
  save("departments", departments);
  deptCode.value = deptName.value = "";
  renderDepartments();
}
function renderDepartments(){
  deptList.innerHTML = "";
  departments.forEach(d => deptList.innerHTML += `<li>${d.code} - ${d.name}</li>`);
}
renderDepartments();

/* ===== Job ===== */
let jobs = load("jobs");
function addJob(){
  jobs.push({id:Date.now(), code:jobCode.value, name:jobName.value, active:true});
  save("jobs", jobs);
  jobCode.value = jobName.value = "";
  renderJobs();
}
function renderJobs(){
  jobList.innerHTML = "";
  jobs.forEach(j => jobList.innerHTML += `<li>${j.code} - ${j.name}</li>`);
}
renderJobs();

/* ===== Shift ===== */
let shifts = load("shifts");
function addShift(){
  shifts.push({id:Date.now(), code:shiftCode.value, name:shiftName.value, active:true});
  save("shifts", shifts);
  shiftCode.value = shiftName.value = "";
  renderShifts();
}
function renderShifts(){
  shiftList.innerHTML = "";
  shifts.forEach(s => shiftList.innerHTML += `<li>${s.code} - ${s.name}</li>`);
}
renderShifts();
</script>

</body>
</html>
