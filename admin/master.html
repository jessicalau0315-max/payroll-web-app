<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Testing | Admin - Master Data</title>
  <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- ===== Header ===== -->
<div class="header">
  <div class="logo">🧪 Testing</div>
  <div class="user">
    Admin
    <button onclick="logout()">Logout</button>
  </div>
</div>

<!-- ===== Layout ===== -->
<div class="layout">

  <!-- ===== Sidebar ===== -->
  <div class="sidebar">
    <a href="dashboard.html">🏠 Dashboard</a>
    <a href="master.html">🗂 Master Data</a>
    <a href="employees.html">👥 Employees</a>
    <a href="attendance.html">⏱ Attendance</a>
    <a href="payroll.html">💰 Payroll</a>
    <a href="reports.html">📄 Reports</a>
  </div>

  <!-- ===== Content ===== -->
  <div class="content">

    <h1>Master Data</h1>

    <!-- ===== Tabs ===== -->
    <div class="master-tabs">
      <div class="master-tab active" onclick="showTab('location')">上班地點</div>
      <div class="master-tab" onclick="showTab('department')">部門</div>
      <div class="master-tab" onclick="showTab('job')">工種</div>
    </div>

    <!-- ================= Location ================= -->
    <div id="tab-location" class="master-content active">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2>📍 上班地點</h2>
        <button class="add-btn" onclick="openLocationModal()">+</button>
      </div>

      <!-- ===== Filters ===== -->
<div style="display:flex; gap:12px; margin:12px 0; flex-wrap:wrap;">
  
  <!-- 公司 -->
  <select id="filterCompany" onchange="applyFilters()">
    <option value="">全部公司</option>
  </select>

  <!-- 部門 -->
  <select id="filterDepartment" onchange="applyFilters()">
    <option value="">全部部門</option>
  </select>

  <!-- 工作地點 -->
  <select id="filterLocation" onchange="applyFilters()">
    <option value="">全部地點</option>
  </select>

  <!-- 客戶 -->
  <input id="filterCustomer" placeholder="輸入客戶" oninput="applyFilters()">

  <button onclick="clearFilters()">清除</button>
</div>
      
      <table class="table">
        <thead>
          <tr>
            <th>公司</th>
            <th>地點</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="locationBody"></tbody>
      </table>
    </div>

    <!-- ================= Department ================= -->
    <div id="tab-department" class="master-content">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2>🏢 部門</h2>
        <button class="add-btn" onclick="openDepartmentModal()">+</button>
      </div>

      <table class="table">
        <thead>
          <tr>
            <th>公司</th>
            <th>地點</th>
            <th>代碼</th>
            <th>名稱</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="departmentBody"></tbody>
      </table>
    </div>

    <!-- ================= Job ================= -->
    <div id="tab-job" class="master-content">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h2>🛠 工種</h2>
        <button class="add-btn" onclick="openJobModal()">+</button>
      </div>

      <!-- ===== Filters ===== -->
<div style="display:flex; gap:12px; margin:12px 0; flex-wrap:wrap;">
  
  <!-- 公司 -->
  <select id="filterCompany" onchange="applyFilters()">
    <option value="">全部公司</option>
  </select>

  <!-- 部門 -->
  <select id="filterDepartment" onchange="applyFilters()">
    <option value="">全部部門</option>
  </select>

  <!-- 工作地點 -->
  <select id="filterLocation" onchange="applyFilters()">
    <option value="">全部地點</option>
  </select>

  <!-- 客戶 -->
  <input id="filterCustomer" placeholder="輸入客戶" oninput="applyFilters()">

  <button onclick="clearFilters()">清除</button>
</div>

      <table class="table">
        <thead>
          <tr>
            <th>名稱</th>
            <th>狀態</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="jobBody"></tbody>
      </table>
    </div>

  </div>
</div>

<!-- ================= Modals ================= -->

<!-- Location Modal -->
<div id="locationModal" class="modal-overlay">
  <div class="modal">
    <h3>上班地點</h3>
    <label>公司</label>
    <input id="locCompany" value="KLN Logistics (HK) LTD.">
    <label>地點</label>
    <input id="locName">
    <input type="hidden" id="locEditId">
    <br><br>
    <button onclick="saveLocation()">儲存</button>
    <button onclick="closeLocationModal()">取消</button>
  </div>
</div>

<!-- Department Modal -->
<div id="departmentModal" class="modal-overlay">
  <div class="modal">
    <h3>部門</h3>
    <label>公司</label>
    <input id="deptCompany" value="KLN Logistics (HK) LTD.">
    <label>地點</label>
    <select id="deptLocation"></select>
    <label>代碼</label>
    <input id="deptCode">
    <label>名稱</label>
    <input id="deptName">
    <input type="hidden" id="deptEditId">
    <br><br>
    <button onclick="saveDepartment()">儲存</button>
    <button onclick="closeDepartmentModal()">取消</button>
  </div>
</div>

<!-- Job Modal -->
<div id="jobModal" class="modal-overlay">
  <div class="modal">
    <h3>工種</h3>
    <label>名稱</label>
    <input id="jobName">
    <input type="hidden" id="jobEditId">
    <br><br>
    <button onclick="saveJob()">儲存</button>
    <button onclick="closeJobModal()">取消</button>
  </div>
</div>

<script>
/* ===== Auth ===== */
if (localStorage.getItem("role") !== "admin") {
  location.href = "../login.html";
}
function logout() {
  localStorage.clear();
  location.href = "../login.html";
}

/* ===== Tabs ===== */
function showTab(name){
  var tabs = document.getElementsByClassName("master-tab");
  var conts = document.getElementsByClassName("master-content");
  for(var i=0;i<tabs.length;i++){tabs[i].classList.remove("active");}
  for(var j=0;j<conts.length;j++){conts[j].classList.remove("active");}
  document.getElementById("tab-"+name).classList.add("active");
}

/* ===== Data ===== */
var locations = JSON.parse(localStorage.getItem("locations")||"[]");
var departments = JSON.parse(localStorage.getItem("departments")||"[]");
var jobs = JSON.parse(localStorage.getItem("jobs")||"[]");

/* ===== Render ===== */
function renderLocations(){
  var b = document.getElementById("locationBody");
  b.innerHTML="";
  for(var i=0;i<locations.length;i++){
    var l=locations[i];
    var tr="<tr><td>"+l.company+"</td><td>"+l.name+"</td><td>"+(l.active?"啟用":"停用")+"</td>"+
      "<td><button onclick='editLocation("+l.id+")'>編輯</button>"+
      "<button onclick='toggleLocation("+l.id+")'>切換</button></td></tr>";
    b.innerHTML+=tr;
  }
}
function renderDepartments(){
  var b=document.getElementById("departmentBody");b.innerHTML="";
  for(var i=0;i<departments.length;i++){
    var d=departments[i];
    b.innerHTML+="<tr><td>"+d.company+"</td><td>"+d.locationName+"</td><td>"+d.code+"</td><td>"+d.name+
      "</td><td>"+(d.active?"啟用":"停用")+"</td><td><button onclick='editDepartment("+d.id+")'>編輯</button>"+
      "<button onclick='toggleDepartment("+d.id+")'>切換</button></td></tr>";
  }
}
function renderJobs(){
  var b=document.getElementById("jobBody");b.innerHTML="";
  for(var i=0;i<jobs.length;i++){
    var j=jobs[i];
    b.innerHTML+="<tr><td>"+j.name+"</td><td>"+(j.active?"啟用":"停用")+
      "</td><td><button onclick='editJob("+j.id+")'>編輯</button>"+
      "<button onclick='toggleJob("+j.id+")'>切換</button></td></tr>";
  }
}

/* ===== Location ===== */
function openLocationModal(){locationModal.style.display="flex";locEditId.value="";}
function closeLocationModal(){locationModal.style.display="none";}
function saveLocation(){
  if(locEditId.value){
    for(var i=0;i<locations.length;i++){
      if(locations[i].id==locEditId.value){
        locations[i].company=locCompany.value;
        locations[i].name=locName.value;
      }
    }
  }else{
    locations.push({id:Date.now(),company:locCompany.value,name:locName.value,active:true});
  }
  localStorage.setItem("locations",JSON.stringify(locations));
  closeLocationModal();renderLocations();
}
function editLocation(id){
  for(var i=0;i<locations.length;i++){
    if(locations[i].id==id){
      locCompany.value=locations[i].company;
      locName.value=locations[i].name;
      locEditId.value=id;
      locationModal.style.display="flex";
    }
  }
}
function toggleLocation(id){
  for(var i=0;i<locations.length;i++){
    if(locations[i].id==id){locations[i].active=!locations[i].active;}
  }
  localStorage.setItem("locations",JSON.stringify(locations));renderLocations();
}

/* ===== Department ===== */
function openDepartmentModal(){
  deptEditId.value="";
  deptLocation.innerHTML="";
  for(var i=0;i<locations.length;i++){
    if(locations[i].active){
      deptLocation.innerHTML+="<option value='"+locations[i].id+"'>"+locations[i].name+"</option>";
    }
  }
  departmentModal.style.display="flex";
}
function closeDepartmentModal(){departmentModal.style.display="none";}
function saveDepartment(){
  var locId=Number(deptLocation.value);
  var locName="";
  for(var i=0;i<locations.length;i++){if(locations[i].id==locId){locName=locations[i].name;}}
  if(deptEditId.value){
    for(var j=0;j<departments.length;j++){
      if(departments[j].id==deptEditId.value){
        departments[j].company=deptCompany.value;
        departments[j].locationId=locId;
        departments[j].locationName=locName;
        departments[j].code=deptCode.value;
        departments[j].name=deptName.value;
      }
    }
  }else{
    departments.push({id:Date.now(),company:deptCompany.value,locationId:locId,locationName:locName,code:deptCode.value,name:deptName.value,active:true});
  }
  localStorage.setItem("departments",JSON.stringify(departments));
  closeDepartmentModal();renderDepartments();
}
function editDepartment(id){
  for(var i=0;i<departments.length;i++){
    if(departments[i].id==id){
      openDepartmentModal();
      deptCompany.value=departments[i].company;
      deptCode.value=departments[i].code;
      deptName.value=departments[i].name;
      deptEditId.value=id;
    }
  }
}
function toggleDepartment(id){
  for(var i=0;i<departments.length;i++){
    if(departments[i].id==id){departments[i].active=!departments[i].active;}
  }
  localStorage.setItem("departments",JSON.stringify(departments));renderDepartments();
}

/* ===== Job ===== */
function openJobModal(){jobEditId.value="";jobModal.style.display="flex";}
function closeJobModal(){jobModal.style.display="none";}
function saveJob(){
  if(jobEditId.value){
    for(var i=0;i<jobs.length;i++){
      if(jobs[i].id==jobEditId.value){jobs[i].name=jobName.value;}
    }
  }else{
    jobs.push({id:Date.now(),name:jobName.value,active:true});
  }
  localStorage.setItem("jobs",JSON.stringify(jobs));
  closeJobModal();renderJobs();
}
function editJob(id){
  for(var i=0;i<jobs.length;i++){
    if(jobs[i].id==id){
      jobName.value=jobs[i].name;
      jobEditId.value=id;
      jobModal.style.display="flex";
    }
  }
}
function toggleJob(id){
  for(var i=0;i<jobs.length;i++){
    if(jobs[i].id==id){jobs[i].active=!jobs[i].active;}
  }
  localStorage.setItem("jobs",JSON.stringify(jobs));renderJobs();
}

/* ===== Init ===== */
renderLocations();renderDepartments();renderJobs();
</script>

</body>
</html>
